<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" width="520" height="400">
  <rect width="520" height="400" fill="#0f1115"/>
  <text x="20" y="32" fill="#e5e7eb" font-family="Menlo,monospace" font-size="18" font-weight="700">Manager (current chat)</text>
  <text x="20" y="52" fill="#9ca3af" font-family="Menlo,monospace" font-size="11">task.md → 4 workers → summary.md</text>
  <rect x="20" y="80" width="480" height="100" fill="#1a1d24" rx="6" stroke="#2a2f38"/>
  <text x="30" y="100" fill="#f59e0b" font-family="Menlo,monospace" font-size="12" font-weight="600">~/blocks-shared/&lt;session&gt;/task.md</text>
  <text x="30" y="120" fill="#e5e7eb" font-family="Menlo,monospace" font-size="11">Each worker research 1 LLM API:</text>
  <text x="30" y="138" fill="#e5e7eb" font-family="Menlo,monospace" font-size="11">  - worker-1: OpenAI</text>
  <text x="30" y="156" fill="#e5e7eb" font-family="Menlo,monospace" font-size="11">  - worker-2: Anthropic</text>
  <text x="30" y="174" fill="#e5e7eb" font-family="Menlo,monospace" font-size="11">  - worker-3: Google</text>
  <text x="20" y="210" fill="#9ca3af" font-family="Menlo,monospace" font-size="11">Worker status:</text>
  <text x="20" y="232" fill="#22c55e" font-family="Menlo,monospace" font-size="12">✓ worker-1  done  ·  results/worker-1.md</text>
  <text x="20" y="252" fill="#22c55e" font-family="Menlo,monospace" font-size="12">✓ worker-2  done  ·  results/worker-2.md</text>
  <text x="20" y="272" fill="#f59e0b" font-family="Menlo,monospace" font-size="12">⏳ worker-3  running  · 30%</text>
  <text x="20" y="292" fill="#f59e0b" font-family="Menlo,monospace" font-size="12">⏳ worker-4  running  · 6%</text>
  <text x="20" y="330" fill="#9ca3af" font-family="Menlo,monospace" font-size="11">After 4/4 done, Manager writes:</text>
  <text x="20" y="352" fill="#f59e0b" font-family="Menlo,monospace" font-size="12" font-weight="600">→ summary.md</text>
  <text x="20" y="388" fill="#9ca3af" font-family="Menlo,monospace" font-size="10">blocks --manager --workers 4</text>
</svg>
