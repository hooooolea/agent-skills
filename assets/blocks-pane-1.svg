<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" width="520" height="400">
  <rect width="520" height="400" fill="#0f1115"/>
  <text x="20" y="32" fill="#e5e7eb" font-family="Menlo,monospace" font-size="18" font-weight="700">Manager (current chat)</text>
  <text x="20" y="52" fill="#9ca3af" font-family="Menlo,monospace" font-size="11">task.md → 4 workers → summary.md</text>

  <!-- task.md box (full width, 1 box at top) -->
  <rect x="20" y="70" width="480" height="100" fill="#1a1d24" rx="6" stroke="#2a2f38"/>
  <text x="30" y="90" fill="#f59e0b" font-family="Menlo,monospace" font-size="12" font-weight="600">~/blocks-shared/&lt;session&gt;/task.md</text>
  <text x="30" y="110" fill="#e5e7eb" font-family="Menlo,monospace" font-size="11">Each worker research 1 LLM API:</text>
  <text x="30" y="128" fill="#e5e7eb" font-family="Menlo,monospace" font-size="11">  - worker-1: OpenAI</text>
  <text x="30" y="146" fill="#e5e7eb" font-family="Menlo,monospace" font-size="11">  - worker-2: Anthropic</text>
  <text x="30" y="164" fill="#e5e7eb" font-family="Menlo,monospace" font-size="11">  - worker-3: Google</text>

  <!-- 2x2 worker grid (4 boxes, 230×80 each — equal share) -->
  <!-- top-left: worker-1 ✓ done -->
  <rect x="20" y="190" width="230" height="80" fill="#1a1d24" rx="6" stroke="#2a2f38"/>
  <text x="30" y="210" fill="#f59e0b" font-family="Menlo,monospace" font-size="12" font-weight="600">worker-1</text>
  <text x="30" y="232" fill="#22c55e" font-family="Menlo,monospace" font-size="11">✓ done · results/worker-1.md</text>
  <text x="30" y="252" fill="#9ca3af" font-family="Menlo,monospace" font-size="10">OpenAI pricing fetched</text>

  <!-- top-right: worker-2 ✓ done -->
  <rect x="270" y="190" width="230" height="80" fill="#1a1d24" rx="6" stroke="#2a2f38"/>
  <text x="280" y="210" fill="#f59e0b" font-family="Menlo,monospace" font-size="12" font-weight="600">worker-2</text>
  <text x="280" y="232" fill="#22c55e" font-family="Menlo,monospace" font-size="11">✓ done · results/worker-2.md</text>
  <text x="280" y="252" fill="#9ca3af" font-family="Menlo,monospace" font-size="10">Anthropic pricing fetched</text>

  <!-- bottom-left: worker-3 ⏳ running 30% -->
  <rect x="20" y="285" width="230" height="80" fill="#1a1d24" rx="6" stroke="#2a2f38"/>
  <text x="30" y="305" fill="#f59e0b" font-family="Menlo,monospace" font-size="12" font-weight="600">worker-3</text>
  <text x="30" y="327" fill="#f59e0b" font-family="Menlo,monospace" font-size="11">⏳ running · 30%</text>
  <text x="30" y="347" fill="#9ca3af" font-family="Menlo,monospace" font-size="10">scraping Google pricing</text>

  <!-- bottom-right: worker-4 ⏳ running 6% -->
  <rect x="270" y="285" width="230" height="80" fill="#1a1d24" rx="6" stroke="#2a2f38"/>
  <text x="280" y="305" fill="#f59e0b" font-family="Menlo,monospace" font-size="12" font-weight="600">worker-4</text>
  <text x="280" y="327" fill="#f59e0b" font-family="Menlo,monospace" font-size="11">⏳ running · 6%</text>
  <text x="280" y="347" fill="#9ca3af" font-family="Menlo,monospace" font-size="10">scraping Mistral pricing</text>

  <!-- footer -->
  <text x="20" y="385" fill="#9ca3af" font-family="Menlo,monospace" font-size="10">blocks --manager --workers 4 → after 4/4 done, write summary.md</text>
</svg>
